{% extends "base.html" %}
{% block title %}Add Leader{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800">
  <h1 class="mb-4 text-2xl font-semibold">Add Leader</h1>
  {% if error %}
  <div class="mb-4 rounded-md border border-red-300 bg-red-50 px-4 py-2 text-sm text-red-700">{{ error }}</div>
  {% endif %}
  <form method="post" action="/leaders/new" class="space-y-4">
    <label class="block text-sm font-medium">
      <span class="text-gray-700 dark:text-gray-200">Name</span>
      <input type="text" name="name" required class="mt-1 w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:border-brand focus:ring-brand">
    </label>
    <label class="block text-sm font-medium">
      <span class="text-gray-700 dark:text-gray-200">Email</span>
      <input type="email" name="email" required class="mt-1 w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:border-brand focus:ring-brand">
    </label>
    <label class="block text-sm font-medium">
      <span class="text-gray-700 dark:text-gray-200">Password</span>
      <input type="password" name="password" required class="mt-1 w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:border-brand focus:ring-brand">
    </label>
    <label class="block text-sm font-medium">
      <span class="text-gray-700 dark:text-gray-200">Role</span>
      <select name="role" class="mt-1 w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:border-brand focus:ring-brand">
        <option value="leader">Leader</option>
        <option value="admin">Admin</option>
      </select>
    </label>
    <button type="submit" class="inline-flex items-center rounded-md bg-brand px-4 py-2 text-sm font-medium text-white hover:bg-blue-600">Create Leader</button>
  </form>
</div>
{% endblock %}

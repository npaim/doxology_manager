{% extends "base.html" %}

{% block title %}Calendar{% endblock %}

{% block content %}

<div class="flex items-center justify-between">
  <h2 class="text-2xl font-semibold" data-i18n="calendar_title">Church Calendar</h2>
  <a href="/services/new/choose" class="inline-flex items-center gap-2 rounded-md bg-brand px-3 py-2 text-white text-sm font-medium hover:bg-blue-600">
    <span data-i18n="new_service">New Service</span>
  </a>
</div>

<form method="get" action="/services/new/choose" class="mt-4 flex flex-col gap-3 rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-700 dark:bg-gray-800 sm:flex-row sm:items-end sm:justify-between">
  <div class="min-w-0">
    <div class="text-sm font-medium text-gray-900 dark:text-gray-100" data-i18n="quick_create">Quick Create</div>
    <p class="mt-1 text-sm text-gray-600 dark:text-gray-400" data-i18n="quick_create_help">Pick a date, then choose the service template.</p>
  </div>
  <div class="flex flex-col gap-3 sm:flex-row sm:items-end">
    <label class="block text-sm font-medium">
      <span class="text-gray-700 dark:text-gray-200" data-i18n="date">Date</span>
      <input type="date" name="date" value="{{ '%04d-%02d-01'|format(year, month) }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand dark:border-gray-700 dark:bg-gray-900 sm:min-w-44">
    </label>
    <button type="submit" class="inline-flex items-center justify-center rounded-md border border-brand px-4 py-2 text-sm font-medium text-brand hover:bg-blue-50 dark:hover:bg-blue-950/40" data-i18n="choose_template">Choose Template</button>
  </div>
</form>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js" defer></script>

<style>
  .tooltip { position: fixed; background: white; border: 1px solid #e5e7eb; border-radius: .5rem; padding: .75rem; font-size: 14px; box-shadow: 0 10px 20px rgba(0,0,0,.08); pointer-events: none; display: none; max-width: 320px; max-height: calc(100vh - 24px); overflow: auto; z-index: 2000; }
  .tooltip .tooltip-time { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .fc-toolbar-title { text-transform: capitalize; }
</style>

<div id="tooltip" class="tooltip"></div>

<div class="mt-4 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-3">
  <div id="calendar" class="w-full"></div>
</div>

{% endblock %}

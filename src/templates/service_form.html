{% extends "base.html" %}
{% block title %}Service{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4"><span data-i18n="service">Service</span></h1>
<div class="mb-4" id="form-errors">
  {% if error %}
  <div class="rounded-md border border-red-300 bg-red-50 text-red-700 px-4 py-2 text-sm">{{ error }}</div>
  {% endif %}
</div>
<form novalidate method="post" action="/services/new" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6 max-w-xl">
  {% if service %}
  <input type="hidden" name="service_id" value="{{ service.id }}">
  {% endif %}
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <label class="block text-sm font-medium">
      <span class="text-gray-700" data-i18n="date">Date</span>
      <input type="date" name="service_date" required value="{{ service.service_date.strftime('%Y-%m-%d') if service else service_date }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand">
    </label>
    <label class="block text-sm font-medium">
      <span class="text-gray-700" data-i18n="start_time">Start Time</span>
      <input type="time" name="start_time" required value="{{ service.start_time.strftime('%H:%M') if service and service.start_time else (service.service_time.strftime('%H:%M') if service and service.service_time else (start_time or '')) }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand">
    </label>
    <label class="block text-sm font-medium">
      <span class="text-gray-700" data-i18n="end_time">End Time</span>
      <input type="time" name="end_time" required value="{{ service.end_time.strftime('%H:%M') if service and service.end_time else (service.service_time.strftime('%H:%M') if service and service.service_time else (end_time or '')) }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand">
    </label>
    <label class="block text-sm font-medium sm:col-span-2">
      <span class="text-gray-700" data-i18n="preacher">Preacher</span>
      <input type="text" name="preacher" data-member-autocomplete value="{{ service.preacher if service else '' }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" placeholder="Name">
    </label>
    <label class="block text-sm font-medium sm:col-span-2">
      <span class="text-gray-700" data-i18n="service_leader">Service Leader</span>
      <input type="text" name="leader" data-member-autocomplete value="{{ service.leader if service else '' }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" placeholder="Name">
    </label>
    <label class="block text-sm font-medium sm:col-span-2">
      <span class="text-gray-700" data-i18n="sermon_title">Sermon Title</span>
      <input type="text" name="title" value="{{ service.title if service else '' }}" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" placeholder="Optional">
    </label>
    <label class="block text-sm font-medium sm:col-span-2">
      <span class="text-gray-700" data-i18n="notes">Notes</span>
      <textarea name="notes" rows="4" class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" placeholder="Optional">{{ service.notes if service else '' }}</textarea>
    </label>
  </div>
  <div class="mt-6 flex items-center gap-3">
    <button type="submit" class="inline-flex items-center rounded-md bg-brand px-4 py-2 text-white text-sm font-medium hover:bg-blue-600">
      {% if service %}<span data-i18n="update_service">Update Service</span>{% else %}<span data-i18n="save_service">Save Service</span>{% endif %}
    </button>
    <a href="/" class="text-sm text-gray-700 hover:text-gray-900">← <span data-i18n="calendar">Calendar</span></a>
  </div>
</form>
{% endblock %}
